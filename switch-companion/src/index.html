<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#080909" />
<title>MoodWave Switch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #080909; color: rgba(255,255,255,.86); font-family: -apple-system, "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body { display: -webkit-flex; display: flex; -webkit-justify-content: center; justify-content: center; -webkit-align-items: flex-start; align-items: flex-start; }

  .mw-root {
    position: relative;
    width: 100%; max-width: 560px;
    margin: 0 auto;
    padding: 12px 16px 50px;
    min-height: 100%;
  }
  .mw-progress {
    position: absolute; top: 0; left: 0; height: 2px;
    background: #42d8b2;
    -webkit-transition: width .3s ease; transition: width .3s ease;
    border-radius: 0 1px 1px 0; z-index: 10;
    width: 0;
  }
  .mw-brand-bar {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    gap: 6px; margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .mw-brand-bar span {
    color: rgba(255,255,255,.38); font-size: 12px;
    font-weight: 600; letter-spacing: .02em;
  }
  .mw-brand-img { width: 20px; height: 20px; opacity: .7; font-size: 16px; line-height: 20px; }

  .mw-status {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    -webkit-justify-content: space-between; justify-content: space-between;
    gap: 8px; margin: 0 0 8px;
    color: rgba(255,255,255,.52); font-size: 13px; line-height: 16px; min-width: 0;
  }
  .mw-topbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 36px;
    gap: 5px;
    margin-bottom: 10px;
  }
  .mw-tabs {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 5px;
  }

  .mw-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }
  .mw-grid.two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .mw-action-row {
    display: -webkit-flex; display: flex; gap: 6px; margin-top: 10px;
  }
  .mw-action-row > * { -webkit-flex: 1; flex: 1; min-width: 0; }

  .mw-button {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center; gap: 0;
    width: 100%; min-width: 0; height: 40px; padding: 0 8px;
    border: 1px solid rgba(255,255,255,.11); border-radius: 8px;
    background: rgba(255,255,255,.055); color: rgba(255,255,255,.76);
    font-size: 14px; font-weight: 700; line-height: 1;
    letter-spacing: 0; text-align: center; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  .mw-button.is-active {
    border-color: rgba(66,216,178,.7); background: rgba(66,216,178,.16); color: #42d8b2;
  }
  .mw-button[disabled] { opacity: .42; cursor: default; }
  .mw-button.is-icon {
    padding: 0; font-size: 18px; text-overflow: clip;
  }
  .mw-button.is-transport { padding: 0; font-size: 18px; text-overflow: clip; }
  .mw-button .mw-icon {
    display: inline-block; min-width: 16px; margin-right: 5px;
    color: rgba(66,216,178,.92); font-size: 13px; text-align: center;
  }
  .mw-button.is-icon .mw-icon { margin-right: 0; }

  /* busy animations */
  .mw-busy-wrap { display: inline; }
  .mw-busy-dot {
    display: inline-block; width: 7px; height: 7px; margin-right: 6px;
    border-radius: 999px; background: #42d8b2;
    box-shadow: 0 0 8px rgba(66,216,178,.7); vertical-align: 1px;
    -webkit-animation: mw-pulse 1.2s ease-in-out infinite;
    animation: mw-pulse 1.2s ease-in-out infinite;
  }
  @-webkit-keyframes mw-pulse {
    0%, 100% { opacity: 1; -webkit-box-shadow: 0 0 8px rgba(66,216,178,.7); }
    50% { opacity: .4; -webkit-box-shadow: 0 0 4px rgba(66,216,178,.3); }
  }
  @keyframes mw-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(66,216,178,.7); }
    50% { opacity: .4; box-shadow: 0 0 4px rgba(66,216,178,.3); }
  }
  .mw-busy-ellipsis { display: inline; margin-left: 2px; }
  .mw-busy-ellipsis i {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: #42d8b2; margin: 0 1px;
    -webkit-animation: mw-bounce 1.2s ease-in-out infinite;
    animation: mw-bounce 1.2s ease-in-out infinite;
  }
  .mw-busy-ellipsis i:nth-child(1) { -webkit-animation-delay: 0s; animation-delay: 0s; }
  .mw-busy-ellipsis i:nth-child(2) { -webkit-animation-delay: .2s; animation-delay: .2s; }
  .mw-busy-ellipsis i:nth-child(3) { -webkit-animation-delay: .4s; animation-delay: .4s; }
  @-webkit-keyframes mw-bounce {
    0%, 80%, 100% { -webkit-transform: translateY(0); opacity: .3; }
    40% { -webkit-transform: translateY(-5px); opacity: 1; }
  }
  @keyframes mw-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .3; }
    40% { transform: translateY(-5px); opacity: 1; }
  }
  .mw-button:focus { outline: 2px solid #42d8b2; outline-offset: 1px; }

  /* cards */
  .mw-card {
    padding: 12px 14px; border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px; background: rgba(255,255,255,.04); min-width: 0;
  }
  .mw-card-accent { background: rgba(66,216,178,0.06); }
  .mw-mini { margin-bottom: 10px; }

  .mw-mini-head {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    -webkit-justify-content: space-between; justify-content: space-between;
    gap: 8px; margin-bottom: 10px;
  }
  .mw-mini-title {
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: rgba(255,255,255,.82); font-size: 14px; font-weight: 800;
  }
  .mw-mini-state {
    -webkit-flex-shrink: 0; flex-shrink: 0;
    color: rgba(66,216,178,.86); font-size: 12px; font-weight: 800;
  }
  .mw-progress-bar {
    height: 3px; margin: 6px 0 0; border-radius: 2px;
    background: rgba(255,255,255,.08); overflow: hidden;
  }
  .mw-progress-bar-fill {
    height: 100%; background: #42d8b2; border-radius: 2px;
    -webkit-transition: width .5s linear; transition: width .5s linear;
  }

  /* minimal mode */
  .mw-minimal { padding: 8px 0; }
  .mw-minimal-logo {
    position: absolute; top: 10px; right: 10px;
    font-size: 18px; opacity: .5;
  }
  .mw-minimal-tags {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .mw-minimal-tag {
    display: inline-block; padding: 2px 8px;
    border: 1px solid rgba(255,255,255,.1); border-radius: 4px;
    background: rgba(255,255,255,.04); color: rgba(255,255,255,.78);
    font-size: 11px; font-weight: 600; line-height: 18px;
  }
  .mw-minimal-world-card {
    padding: 16px; border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px; background: rgba(255,255,255,.04);
    margin-bottom: 14px; min-width: 0;
  }
  .mw-minimal-world-location { color: rgba(255,255,255,.52); font-size: 14px; margin-bottom: 10px; }
  .mw-minimal-world-label { color: rgba(255,255,255,.38); font-size: 12px; font-weight: 600; margin-bottom: 4px; letter-spacing: .04em; }
  .mw-minimal-world-game { color: rgba(255,255,255,.92); font-size: 22px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
  .mw-minimal-world-mood { color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; }
  .mw-minimal-scene { color: rgba(255,255,255,.78); font-size: 11px; font-weight: 500; margin-bottom: 12px; line-height: 1.3; letter-spacing: .02em; }
  .mw-minimal-loading {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    gap: 6px; margin-bottom: 12px;
  }
  .mw-minimal-loading-bar { -webkit-flex: 1; flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,.08); }
  .mw-minimal-loading-fill {
    height: 100%; border-radius: 2px; background: #42d8b2;
    -webkit-transition: width .3s linear; transition: width .3s linear;
  }
  .mw-minimal-loading-pct { color: rgba(66,216,178,.78); font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; }
  .mw-minimal-quote {
    padding: 14px 16px; border-left: 4px solid #42d8b2;
    border-radius: 0 8px 8px 0; background: rgba(66,216,178,.08);
    color: #42d8b2; font-size: 16px; font-weight: 700;
    line-height: 1.4; margin-bottom: 12px; min-width: 0;
  }
  .mw-minimal-quote-track {
    font-size: 13px; font-weight: 500; color: rgba(66,216,178,.6);
    border-left: none; padding-left: 14px; margin-top: -4px;
  }
  .mw-minimal-playing { color: rgba(66,216,178,.78); font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .mw-minimal-track {
    color: rgba(255,255,255,.74); font-size: 14px; font-weight: 700;
    margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mw-minimal-progress { height: 2.5px; margin-bottom: 10px; border-radius: 2px; background: rgba(255,255,255,.08); overflow: hidden; }
  .mw-minimal-progress-fill {
    height: 100%; background: #42d8b2; border-radius: 2px;
    -webkit-transition: width .5s linear; transition: width .5s linear;
  }
  .mw-minimal-lyric {
    color: rgba(255,255,255,.48); font-size: 11px; margin-bottom: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mw-minimal-transport {
    display: -webkit-flex; display: flex; gap: 5px; margin-bottom: 6px;
  }
  .mw-minimal-transport > * { -webkit-flex: 1; flex: 1; }
  .mw-minimal-transport .mw-button { font-size: 16px; height: 36px; }
  .mw-minimal-actions {
    display: -webkit-flex; display: flex; gap: 6px;
  }
  .mw-minimal-actions > * { -webkit-flex: 1; flex: 1; }
  .mw-minimal-actions .mw-button { height: 36px; font-size: 13px; }
  .mw-minimal-toggle {
    display: inline-block; -webkit-flex-shrink: 0; flex-shrink: 0;
    padding: 2px 8px; border: 1px solid rgba(66,216,178,.5);
    border-radius: 4px; background: transparent; color: #42d8b2;
    font-size: 12px; font-weight: 700; cursor: pointer; line-height: 18px;
    -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
  }

  .mw-section-title {
    display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center;
    gap: 6px; margin: 12px 0 8px; color: rgba(255,255,255,.9);
    font-size: 18px; font-weight: 800; line-height: 20px;
  }
  .mw-section-title span { color: #42d8b2; font-size: 16px; }

  .mw-dj { margin-bottom: 6px; color: #42d8b2; font-size: 14px; font-weight: 700; line-height: 1.35; }
  .mw-song { padding: 6px 0; border-top: 1px solid rgba(255,255,255,.06); min-width: 0; }
  .mw-song:first-of-type { border-top: 0; padding-top: 0; }
  .mw-song-active {
    position: relative; padding-left: 8px;
    border-left: 3px solid #42d8b2; background: rgba(66,216,178,0.04); border-radius: 2px;
  }
  .mw-song-active:before {
    content: "\\25B6"; position: absolute; left: -18px; top: 5px;
    font-size: 10px; color: #42d8b2;
  }
  .mw-song-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,.82); font-size: 13px; font-weight: 700; }
  .mw-song-artist, .mw-song-reason { color: rgba(255,255,255,.46); font-size: 12px; line-height: 1.35; }
  .mw-track { margin-bottom: 8px; color: rgba(255,255,255,.78); font-size: 14px; font-weight: 700; }

  .mw-input {
    width: 100%; height: 40px; padding: 0 10px;
    border: 1px solid rgba(255,255,255,.11); border-radius: 8px;
    background: rgba(255,255,255,.055); color: rgba(255,255,255,.76);
    font-size: 14px; outline: none; -webkit-appearance: none; appearance: none;
    box-sizing: border-box;
  }
  .mw-input:focus { border-color: rgba(66,216,178,.7); }
  .mw-input-label { display: block; color: rgba(255,255,255,.52); font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .mw-input-wrap { margin-bottom: 10px; }
  .mw-spacer { margin-top: 10px; }

  @media (max-width: 480px) {
    .mw-root { padding: 10px 12px 36px; }
    .mw-button { height: 36px; font-size: 13px; }
    .mw-section-title { font-size: 16px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  // ─── constants ───
  var moods = [
    { id: "\u5F00\u5FC3", icon: "\u260C" },
    { id: "\u5E73\u9759", icon: "\u25CC" },
    { id: "\u5FE7\u90C1", icon: "\u2601" },
    { id: "\u60B2\u4F24", icon: "\u2602" },
    { id: "\u6CBB\u6108", icon: "\u2726" },
    { id: "\u6124\u6012", icon: "\u26A1" }
  ];
  var searchExamples = [
    { id: "\u96E8\u5929\u82F1\u6587\u8001\u6B4C", icon: "\uD83C\uDF27" },
    { id: "\u4E2D\u53E4\u4E16\u7EAA\u6C11\u8C23", icon: "\uD83C\uDFBB" },
    { id: "\u4E5D\u96F6\u5E74\u4EE3\u6E2F\u4E50", icon: "\uD83D\uDCFC" },
    { id: "\u513F\u65F6\u73A9\u7684\u7F51\u5427", icon: "\uD83D\uDDA5" }
  ];
  var gameVibes = [
    { id: "Boss\u6218", icon: "\u2694", hint: "\u4ECA\u665A\u71C3\u4E00\u70B9\uFF0C\u6CD5\u5370\u6309\u5230\u5E95" },
    { id: "\u63A2\u7D22\u5730\u56FE", icon: "\u2316", hint: "\u6162\u6162\u8D70\uFF0C\u4E0D\u6025\u7740\u8D76\u8DEF" },
    { id: "\u96E8\u591C\u8DD1\u56FE", icon: "\uD83C\uDF19", hint: "\u5916\u9762\u4E0B\u96E8\uFF0C\u9002\u5408\u6162\u6162\u8D70" },
    { id: "\u8D5B\u8F66\u7ADE\u901F", icon: "\uD83C\uDFCE", hint: "\u4ECA\u665A\u901F\u5EA6\u522B\u505C" },
    { id: "\u79CD\u7530\u653E\u677E", icon: "\u2727", hint: "\u4ECA\u665A\u522B\u592A\u7D2F\u4E86" },
    { id: "\u6A21\u62DF\u5668\u6000\u65E7", icon: "\u25A3", hint: "\u50CF\u5C0F\u65F6\u5019\u4E00\u6837" }
  ];
  var cityNameMap = {
    "Rongcheng":"\u8363\u6210","Beijing":"\u5317\u4EAC","Shanghai":"\u4E0A\u6D77",
    "Guangzhou":"\u5E7F\u5DDE","Shenzhen":"\u6DF1\u5733","Hangzhou":"\u676D\u5DDE",
    "Chengdu":"\u6210\u90FD","Nanjing":"\u5357\u4EAC","Wuhan":"\u6B66\u6C49",
    "Xiamen":"\u53A6\u95E8","Qingdao":"\u9752\u5C9B","Dalian":"\u5927\u8FDE",
    "Suzhou":"\u82CF\u5DDE","Chongqing":"\u91CD\u5E86","Xian":"\u897F\u5B89",
    "Changsha":"\u957F\u6C99","Kunming":"\u6606\u660E","Fuzhou":"\u798F\u5DDE",
    "Zhengzhou":"\u90D1\u5DDE","Jinan":"\u6D4E\u5357","Harbin":"\u54C8\u5C14\u6EE8",
    "Shenyang":"\u6C88\u9633","Tianjin":"\u5929\u6D25"
  };
  function cityLabel(raw) { var n = (raw||"").split(",")[0].trim(); return cityNameMap[n]||n; }

  // ─── state ───
  var apiBase = (function() {
    try { var stored = localStorage.getItem("moodwave.switch.apiBase"); if (stored !== null) return stored; } catch(e) {}
    var p = window.location.port || "";
    if (p === "8765" || p === "38765") return "";
    return window.location.protocol + "//" + window.location.hostname + ":8765";
  })();
  // -- localStorage helpers --
  var LS_PAGE = "moodwave.switch.page";
  var LS_GAME_NAME = "moodwave.switch.gameName";
  var LS_MINIMAL = "moodwave.switch.minimalMode";
  var LS_AUTO = "moodwave.switch.autoContinue";
  function lsGet(k, d) { try { var v = localStorage.getItem(k); return v !== null ? v : d; } catch(e) { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }

  var page = lsGet(LS_PAGE, "radio");
  var now = {};
  var busy = false;
  var progress = 0;
  var statusText = "\u8FDE\u63A5\u4E2D";
  var query = searchExamples[0].id;
  var gameVibe = "\u63A2\u7D22\u5730\u56FE";
  var gameName = lsGet(LS_GAME_NAME, "");
  var gameNameEdited = false;
  var minimalMode = lsGet(LS_MINIMAL, "0") === "1";
  var autoContinue = lsGet(LS_AUTO, "0") === "1";
  var localProgressRatio = 0;
  var progressAnchor = { ratio: 0, ts: 0 };
  var runTimer = null;
  var pollTimer = null;
  var progressTimer = null;

  // ─── API (XMLHttpRequest, no fetch/Promise) ───
  function apiRequest(path, body, callback) {
    var url = apiBase.replace(/\/+$/, "") + path;
    var method = body ? "POST" : "GET";
    var xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    xhr.timeout = 15000;
    if (body) xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { callback(null, JSON.parse(xhr.responseText)); }
        catch(e) { callback(new Error("JSON parse error")); }
      } else { callback(new Error("HTTP " + xhr.status)); }
    };
    xhr.onerror = function() { callback(new Error("network error")); };
    xhr.ontimeout = function() { callback(new Error("timeout")); };
    xhr.send(body ? JSON.stringify(body) : null);
  }

  // ─── DOM helpers ───
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }
  function btn(cls, html, disabled, title, onclick) {
    var b = el("button", cls, html);
    if (disabled) b.setAttribute("disabled", "disabled");
    if (title) b.setAttribute("title", title);
    if (onclick) { b.onclick = onclick; }
    return b;
  }

  // ─── data helpers ───
  function getCurrentPlan() {
    if (minimalMode) return now.plan;
    if (page !== "settings" && now.plans && now.plans[page]) return now.plans[page];
    return now.plan;
  }
  function getTrack() {
    var p = getCurrentPlan();
    return (now.now && now.now.track) || (p && p.queue && p.queue[0]) || null;
  }
  function getPlaying() { return !!(now.now && now.now.playing); }
  function getProgressRatio() {
    var sr = (now.now && now.now.progressRatio) ? Number(now.now.progressRatio) : 0;
    return getPlaying() ? localProgressRatio : sr;
  }
  function getCurrentMood() {
    var p = getCurrentPlan();
    return ((now.now && now.now.mood) || (p && p.mood) || "").trim();
  }
  function getQueue() { var p = getCurrentPlan(); return (p && p.queue) || []; }
  function getDjLine() {
    var p = getCurrentPlan();
    return (p && p.tts && p.tts.text) || (p && p.plan && p.plan.say) || (p && p.plan && p.plan.reply) || "";
  }
  function getDjForTrack() {
    var p = getCurrentPlan(); var t = getTrack(); var q = p && p.queue;
    if (!q || !t) return "";
    for (var i = 0; i < q.length; i++) {
      if (q[i].id === t.id || q[i].sourceId === t.sourceId) {
        return (p.cardTts && p.cardTts[i] && p.cardTts[i].text) || "";
      }
    }
    return "";
  }
  function getTrackLine() {
    var t = getTrack();
    return t && t.title ? t.title + (t.artist ? " \u2014 " + t.artist : "") : "AI DJ \u51C6\u5907\u4E2D...";
  }
  function getActiveMode() {
    var m = now.now && now.now.mode;
    if (m === "radio" || m === "search" || m === "game") return m;
    var plans = now.plans || {}; var p = now.plan;
    if (p && p.queue && p.queue.length) {
      var modes = ["game","search","radio"];
      for (var i = 0; i < modes.length; i++) {
        var mp = plans[modes[i]];
        if (mp && mp.queue && mp.queue.length && mp.queue[0].id === p.queue[0].id) return modes[i];
      }
    }
    if (plans.game && plans.game.queue && plans.game.queue.length) return "game";
    if (plans.search && plans.search.queue && plans.search.queue.length) return "search";
    if (plans.radio && plans.radio.queue && plans.radio.queue.length) return "radio";
    return null;
  }
  function getSceneText() {
    var mode = getActiveMode();
    if (mode === "game" && gameName.trim()) return "\uD83C\uDFAE \u6B63\u5728\u966A\u4F60\u73A9 " + gameName.trim();
    if (mode === "game") {
      for (var i = 0; i < gameVibes.length; i++) {
        if (gameVibes[i].id === gameVibe) return gameVibes[i].icon + " " + gameVibes[i].id + " \u2014 " + gameVibes[i].hint;
      }
      return "\uD83C\uDFAE " + (gameVibe || "\u6E38\u620F\u7535\u53F0");
    }
    if (mode === "search") return query.trim() ? "\u5BFB\u6B4C \u00B7 " + query.trim() : "\u5BFB\u6B4C\u7535\u53F0";
    return getCurrentMood() ? "\u5FC3\u60C5\u7535\u53F0 \u00B7 " + getCurrentMood() : "\u5FC3\u60C5\u7535\u53F0";
  }
  function getWorldContext() {
    var w = now.weather || {};
    var c = cityLabel(w.city||"");
    var cond = w.condition||"\u672A\u77E5";
    var temp = w.temperature!=null ? " " + Math.round(w.temperature) + "\u00B0C" : "";
    var hasGame = getActiveMode()==="game" && !!gameName.trim();
    var mi = null;
    for (var i = 0; i < moods.length; i++) { if (moods[i].id === getCurrentMood()) { mi = moods[i]; break; } }
    var moodIcon = mi ? mi.icon : "";
    var vs = (now.plan && now.plan.plan && now.plan.plan.gameVibeSentence) || "";
    var v = null;
    for (var j = 0; j < gameVibes.length; j++) { if (gameVibes[j].id === gameVibe) { v = gameVibes[j]; break; } }
    var vh = v ? v.hint : "";
    return {city:c,condition:cond,temp:temp,hasGame:hasGame,moodIcon:moodIcon,vibeSentence:vs,vibeHint:vh};
  }
  function getCurrentLyric(track, ratio) {
    if (!track || !track.lyric || !track.lyric.length) return "";
    var dur = track.duration || 180;
    var sec = ratio * dur;
    var idx = -1;
    for (var i = 0; i < track.lyric.length; i++) { if (track.lyric[i].time <= sec) idx = i; else break; }
    return idx >= 0 ? track.lyric[idx].text : "";
  }

  // ─── actions (callback-based) ───
  function refresh(callback) {
    apiRequest("/api/now", null, function(err, data) {
      if (err) {
        statusText = "\u79BB\u7EBF: " + (err.message || String(err)).slice(0, 40);
      } else {
        now = data; statusText = "\u5728\u7EBF";
        try {
          if (!gameNameEdited && window.DFL && window.DFL.Router && window.DFL.Router.MainRunningApp) {
            var rn = window.DFL.Router.MainRunningApp.display_name;
            if (rn) { gameName = String(rn); lsSet(LS_GAME_NAME, gameName); }
          }
        } catch(e) {}
      }
      render();
      if (callback) callback();
    });
  }

  function switchMode(mode) {
    if (mode === "settings") { page = "settings"; lsSet(LS_PAGE, page); render(); return; }
    page = mode; lsSet(LS_PAGE, page);
    render();
    apiRequest("/api/switch-mode", {mode: mode}, function(){});
    refresh();
  }

  function run(label, taskFn, onComplete) {
    busy = true; statusText = label; progress = 0; render();
    runTimer = setInterval(function() {
      if (progress >= 85) return;
      var step = progress < 30 ? 6 : progress < 60 ? 3 : 1;
      progress = Math.min(85, progress + step);
      var pb = document.getElementById("mw-global-progress");
      if (pb) pb.style.width = progress + "%";
    }, 200);

    taskFn(function(err) {
      clearInterval(runTimer); runTimer = null;
      if (err) {
        progress = 0;
        statusText = (err.message || String(err)).slice(0, 40);
        busy = false;
        render();
        if (onComplete) onComplete();
      } else {
        progress = 100; render();
        setTimeout(function() {
          progress = 0;
          busy = false;
          refresh(function() {
            if (onComplete) onComplete();
          });
        }, 600);
      }
    });
  }

  function startRadio(mood) {
    run("\u6B63\u5728\u5F00\u53F0 \u00B7 " + mood, function(cb) {
      apiRequest("/api/ai/radio", {mood:mood, mode:"steamdeck", deferTts:true, autoContinue:autoContinue}, cb);
    });
  }

  function searchRadio() {
    var p = query.trim(); if (!p) return;
    run("\u6B63\u5728\u627E\u6B4C\u5355", function(cb) {
      apiRequest("/api/ai/search", {query:p, mode:"steamdeck", deferTts:true, autoContinue:autoContinue}, cb);
    });
  }

  function nextRadio(scene) {
    run("\u6B63\u5728\u6362\u6C1B\u56F4", function(cb) {
      apiRequest("/api/ai/next-radio", {scene:scene||"", mode:"steamdeck", deferTts:true, autoContinue:autoContinue}, cb);
    });
  }

  function startGameRadio(label) {
    var v = null;
    for (var i = 0; i < gameVibes.length; i++) { if (gameVibes[i].id === gameVibe) { v = gameVibes[i]; break; } }
    run(label||"AI DJ \u51C6\u5907\u4E2D", function(cb) {
      apiRequest("/api/ai/game-radio", {
        gameVibe: gameVibe,
        gameName: gameName.trim()||undefined,
        vibeHint: v ? v.hint : "",
        mode: "steamdeck", deferTts:true, autoContinue:autoContinue
      }, cb);
    });
  }

  function handleMinimalNextBetter() {
    var mode = getActiveMode();
    if (mode === "game") startGameRadio("\u6362\u4E2A\u611F\u89C9");
    else if (mode === "radio") nextRadio("");
    else nextRadio(query);
  }

  // ─── progress timer ───
  function updateProgressTimer() {
    if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
    var track = getTrack(); var playing = getPlaying();
    if (playing && track && track.duration) {
      var sr = (now.now && now.now.progressRatio) ? Number(now.now.progressRatio) : 0;
      progressAnchor = { ratio: sr, ts: (new Date()).getTime() };
      localProgressRatio = sr;
      progressTimer = setInterval(function() {
        var elapsed = ((new Date()).getTime() - progressAnchor.ts) / 1000;
        var dur = track.duration || 180;
        localProgressRatio = Math.min(0.99, progressAnchor.ratio + elapsed / dur);
        render();
      }, 250);
    } else {
      localProgressRatio = (now.now && now.now.progressRatio) ? Number(now.now.progressRatio) : 0;
    }
  }

  // ─── polling ───
  function startPoll() {
    render();
    refresh();
    pollTimer = setInterval(function() { refresh(); }, 5000);
    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState === "visible") refresh();
    });
  }

  // ─── render ───
  function render() {
    var root = document.getElementById("app");
    root.innerHTML = "";
    root.appendChild(buildDOM());
  }

  function buildDOM() {
    var rootDiv = el("div", "mw-root");
    var cp = getCurrentPlan();
    var track = getTrack();
    var playing = getPlaying();
    var pr = getProgressRatio();
    var cm = getCurrentMood();
    var queue = getQueue();
    var djLine = getDjLine();
    var djForTrack = getDjForTrack();

    // global progress bar
    if (busy || progress > 0) {
      var pb = el("div", "mw-progress");
      pb.id = "mw-global-progress";
      pb.style.width = progress + "%";
      rootDiv.appendChild(pb);
    }

    // ─── minimal mode ───
    if (minimalMode && track) {
      var mm = el("div", "mw-minimal");
      mm.style.position = "relative";
      mm.appendChild(el("div", "mw-minimal-logo", "\uD83C\uDFB5"));

      var ctx = getWorldContext();
      if (ctx.hasGame) {
        var wc = el("div", "mw-minimal-world-card");
        wc.appendChild(el("div", "mw-minimal-world-location", "\uD83D\uDCCD " + (ctx.city||"\u672C\u5730") + " \u00B7 " + ctx.condition + ctx.temp));
        wc.appendChild(el("div", "mw-minimal-world-label", "\u6B63\u5728\u966A\u4F60\u73A9"));
        wc.appendChild(el("div", "mw-minimal-world-game", "\uD83C\uDFAE " + gameName));
        var moodStr = (ctx.moodIcon ? ctx.moodIcon + " " : "") + cm + (ctx.vibeSentence ? " \u00B7 \u201C" + ctx.vibeSentence + "\u201D" : ctx.vibeHint ? " \u00B7 " + ctx.vibeHint : "");
        wc.appendChild(el("div", "mw-minimal-world-mood", moodStr));
        mm.appendChild(wc);
      } else {
        var tags = el("div", "mw-minimal-tags");
        if (now.weather) {
          tags.appendChild(el("div", "mw-minimal-tag", (cityLabel(now.weather.city||"")||"\u672C\u5730") + " \u00B7 " + (now.weather.condition||"\u672A\u77E5") + (now.weather.temperature!=null ? " " + Math.round(now.weather.temperature) + "\u00B0C" : "")));
        } else {
          tags.appendChild(el("div", "mw-minimal-tag", "\u672C\u5730 \u00B7 \u672A\u77E5"));
        }
        if (cm) tags.appendChild(el("div", "mw-minimal-tag", cm));
        mm.appendChild(tags);
        mm.appendChild(el("div", "mw-minimal-scene", getSceneText()));
      }

      if (busy) {
        var ld = el("div", "mw-minimal-loading");
        var ldb = el("div", "mw-minimal-loading-bar");
        var ldf = el("div", "mw-minimal-loading-fill"); ldf.style.width = progress + "%"; ldb.appendChild(ldf);
        ld.appendChild(ldb);
        ld.appendChild(el("div", "mw-minimal-loading-pct", progress + "%"));
        mm.appendChild(ld);
      }

      if (djLine) mm.appendChild(el("div", "mw-minimal-quote", djLine));
      if (djForTrack) { var qt = el("div", "mw-minimal-quote mw-minimal-quote-track", djForTrack); mm.appendChild(qt); }

      mm.appendChild(el("div", "mw-minimal-playing", "\uD83D\uDCFB \u6B63\u5728\u966A\u4F60"));
      mm.appendChild(el("div", "mw-minimal-track", (track.title||"\u672A\u77E5\u6B4C\u66F2") + (track.artist ? " \u2014 " + track.artist : "")));

      if (playing) {
        var mpb = el("div", "mw-minimal-progress");
        var mpbf = el("div", "mw-minimal-progress-fill"); mpbf.style.width = Math.round(pr * 100) + "%"; mpb.appendChild(mpbf);
        mm.appendChild(mpb);
      }

      (function() {
        var lyric = getCurrentLyric(track, pr);
        if (lyric) mm.appendChild(el("div", "mw-minimal-lyric", lyric));
      })();

      // transport
      var trans = el("div", "mw-minimal-transport");
      trans.appendChild(btn("mw-button is-transport", "\u23EE", busy, "\u4E0A\u4E00\u9996", function() {
        run("\u4E0A\u4E00\u9996", function(cb) { apiRequest("/api/prev", {}, cb); });
      }));
      trans.appendChild(btn("mw-button is-transport", playing ? "\u23EF" : "\u25B6", busy, playing ? "\u6682\u505C" : "\u64AD\u653E", function() {
        run(playing ? "\u6682\u505C" : "\u64AD\u653E", function(cb) { apiRequest(playing ? "/api/pause" : "/api/play", {}, cb); });
      }));
      trans.appendChild(btn("mw-button is-transport", "\u23ED", busy, "\u4E0B\u4E00\u9996", function() {
        run("\u4E0B\u4E00\u9996", function(cb) { apiRequest("/api/next", {}, cb); });
      }));
      mm.appendChild(trans);

      var act = el("div", "mw-minimal-actions");
      act.appendChild(btn("mw-button", "\u21BB \u6765\u70B9\u522B\u7684", busy, "", handleMinimalNextBetter));
      act.appendChild(btn("mw-button", "\u2726 \u6253\u5F00\u7535\u53F0", false, "", function() { minimalMode = false; lsSet(LS_MINIMAL, "0"); render(); }));
      mm.appendChild(act);

      rootDiv.appendChild(mm);
      updateProgressTimer();
      return rootDiv;
    }

    // ─── standard mode ───

    // status bar
    var st = el("div", "mw-status");
    var stSpan = el("span");
    if (busy) {
      var wrap = el("span", "mw-busy-wrap");
      wrap.appendChild(el("span", "", progress + "%"));
      wrap.style.cssText = "font-size:12px;opacity:.6;margin-right:8px";
      stSpan.appendChild(wrap);
      stSpan.appendChild(el("span", "mw-busy-dot"));
      stSpan.appendChild(document.createTextNode(" " + statusText + " "));
      var ellipsis = el("span", "mw-busy-ellipsis");
      ellipsis.innerHTML = "<i></i><i></i><i></i>";
      stSpan.appendChild(ellipsis);
    } else {
      stSpan.textContent = statusText + (cm ? " \u00B7 " + cm : "");
    }
    st.appendChild(stSpan);

    if (playing && track) {
      var toggle = el("button", "mw-minimal-toggle", "\u25C1 \u6781\u7B80");
      toggle.onclick = function() { minimalMode = true; lsSet(LS_MINIMAL, "1"); render(); };
      st.appendChild(toggle);
    }
    rootDiv.appendChild(st);

    // brand bar
    var bb = el("div", "mw-brand-bar");
    bb.innerHTML = "<span class=\"mw-brand-img\">\uD83C\uDFB5</span><span>MoodWave \u00B7 AI DJ</span>";
    rootDiv.appendChild(bb);

    // topbar
    var tb = el("div", "mw-topbar");
    var tw = el("div", "mw-tabs");
    tw.appendChild(btn("mw-button" + (page==="radio"?" is-active":""), "<span class=\"mw-icon\">\u25C9</span>\u7535\u53F0", busy, "", function() { switchMode("radio"); }));
    tw.appendChild(btn("mw-button" + (page==="search"?" is-active":""), "<span class=\"mw-icon\">\u2315</span>\u5BFB\u6B4C", busy, "", function() { switchMode("search"); }));
    tw.appendChild(btn("mw-button" + (page==="game"?" is-active":""), "<span class=\"mw-icon\">\u25A3</span>\u6E38\u620F", busy, "", function() { switchMode("game"); }));
    tb.appendChild(tw);
    tb.appendChild(btn("mw-button is-icon" + (page==="settings"?" is-active":""), "\u2699", busy, "\u8BBE\u7F6E", function() { switchMode("settings"); }));
    rootDiv.appendChild(tb);

    // mini player
    if (page !== "settings") {
      var mc = el("div", "mw-card mw-mini");
      var mh = el("div", "mw-mini-head");
      mh.appendChild(el("div", "mw-mini-title", getTrackLine()));
      mh.appendChild(el("div", "mw-mini-state", playing ? "\uD83D\uDCFB \u6B63\u5728\u966A\u4F60" : "\u6211\u5728\u7B49\u4F60"));
      mc.appendChild(mh);

      var mg = el("div", "mw-grid");
      mg.appendChild(btn("mw-button is-transport", playing ? "\u2161" : "\u25B6", busy, playing ? "\u6682\u505C" : "\u64AD\u653E", function() {
        run(playing ? "\u6682\u505C" : "\u64AD\u653E", function(cb) { apiRequest(playing ? "/api/pause" : "/api/play", {}, cb); });
      }));
      mg.appendChild(btn("mw-button is-transport", "\u2039", busy, "\u4E0A\u4E00\u9996", function() {
        run("\u4E0A\u4E00\u9996", function(cb) { apiRequest("/api/prev", {}, cb); });
      }));
      mg.appendChild(btn("mw-button is-transport", "\u203A", busy, "\u4E0B\u4E00\u9996", function() {
        run("\u4E0B\u4E00\u9996", function(cb) { apiRequest("/api/next", {}, cb); });
      }));
      mc.appendChild(mg);

      if (playing) {
        var pb2 = el("div", "mw-progress-bar");
        var pbf2 = el("div", "mw-progress-bar-fill"); pbf2.style.width = Math.round(pr * 100) + "%"; pb2.appendChild(pbf2);
        mc.appendChild(pb2);
      }
      rootDiv.appendChild(mc);
    }

    // ─── Radio Tab ───
    if (page === "radio") {
      var rDiv = el("div");
      var rt = el("div", "mw-section-title");
      rt.innerHTML = "<span>\u25C9</span>\u73B0\u5728\u662F\u4EC0\u4E48\u611F\u89C9\uFF1F";
      rDiv.appendChild(rt);

      var rgc = el("div", "mw-card");
      var rg = el("div", "mw-grid");
      for (var mi = 0; mi < moods.length; mi++) {
        var mood = moods[mi];
        rg.appendChild(btn("mw-button" + (cm===mood.id?" is-active":""), "<span class=\"mw-icon\">" + mood.icon + "</span>" + mood.id, busy, "", function(m) { return function() { startRadio(m.id); }; }(mood)));
      }
      rgc.appendChild(rg); rDiv.appendChild(rgc);

      var ar = el("div", "mw-action-row");
      ar.appendChild(btn("mw-button is-active", "\u25B6 \u5F00\u64AD", busy, "", function() { startRadio(cm||"\u5E73\u9759"); }));
      ar.appendChild(btn("mw-button", "\u21BB \u6765\u70B9\u522B\u7684", busy, "", function() { nextRadio(""); }));
      rDiv.appendChild(ar);
      rootDiv.appendChild(rDiv);
    }

    // ─── Search Tab ───
    if (page === "search") {
      var sDiv = el("div");
      var st2 = el("div", "mw-section-title");
      st2.innerHTML = "<span>\u2315</span>\uD83C\uDFAE \u73B0\u5728\u5728\u73A9\u4EC0\u4E48\uFF1F";
      sDiv.appendChild(st2);

      var sc = el("div", "mw-card");
      var sg = el("div", "mw-grid two");
      for (var si = 0; si < searchExamples.length; si++) {
        var ex = searchExamples[si];
        sg.appendChild(btn("mw-button" + (query===ex.id?" is-active":""), "<span class=\"mw-icon\">" + ex.icon + "</span>" + ex.id, busy, ex.id, function(e) { return function() { query = e.id; render(); }; }(ex)));
      }
      sc.appendChild(sg); sDiv.appendChild(sc);

      var iw = el("div", "mw-input-wrap"); iw.style.marginTop = "10px";
      iw.appendChild(el("div", "mw-input-label", "\uD83C\uDFA7 \u60F3\u542C\u4EC0\u4E48\uFF1F"));
      var inp = el("input", "mw-input"); inp.value = query;
      inp.oninput = function() { query = this.value; };
      iw.appendChild(inp); sDiv.appendChild(iw);

      var ar2 = el("div", "mw-action-row");
      ar2.appendChild(btn("mw-button is-active", "\u25B6 \u5F00\u59CB\u7535\u53F0", busy||!query.trim(), "", searchRadio));
      ar2.appendChild(btn("mw-button", "\u21BB \u6765\u70B9\u522B\u7684", busy, "", function() { nextRadio(query); }));
      sDiv.appendChild(ar2);
      rootDiv.appendChild(sDiv);
    }

    // ─── Game Tab ───
    if (page === "game") {
      var gDiv = el("div");
      var gt = el("div", "mw-section-title");
      gt.innerHTML = "<span>\u25A3</span>\u73B0\u5728\u60F3\u600E\u4E48\u73A9\uFF1F";
      gDiv.appendChild(gt);

      var gc = el("div", "mw-card");
      var gg = el("div", "mw-grid two");
      for (var gi = 0; gi < gameVibes.length; gi++) {
        var vibe = gameVibes[gi];
        gg.appendChild(btn("mw-button" + (gameVibe===vibe.id?" is-active":""), "<span class=\"mw-icon\">" + vibe.icon + "</span>" + vibe.id, busy, vibe.hint, function(v) { return function() { gameVibe = v.id; render(); }; }(vibe)));
      }
      gc.appendChild(gg); gDiv.appendChild(gc);

      var iw2 = el("div", "mw-input-wrap"); iw2.style.marginTop = "10px";
      iw2.appendChild(el("div", "mw-input-label", "\uD83C\uDFAE \u73B0\u5728\u5728\u73A9\u4EC0\u4E48\uFF1F"));
      var inp2 = el("input", "mw-input"); inp2.value = gameName;
      inp2.oninput = function() { gameName = this.value; gameNameEdited = true; };
      inp2.onblur = function() { gameNameEdited = true; lsSet(LS_GAME_NAME, gameName); };
      iw2.appendChild(inp2); gDiv.appendChild(iw2);

      var ar3 = el("div", "mw-action-row");
      ar3.appendChild(btn("mw-button is-active", "\u25B6 \u5F00\u59CB\u7535\u53F0", busy||!gameVibe, "", function() { startGameRadio("\u7535\u53F0\u542F\u52A8\u4E2D"); }));
      ar3.appendChild(btn("mw-button", "\u21BB \u6765\u70B9\u522B\u7684", busy||!gameVibe, "", function() { startGameRadio("\u6362\u4E2A\u611F\u89C9"); }));
      gDiv.appendChild(ar3);
      rootDiv.appendChild(gDiv);
    }

    // ─── Settings Tab ───
    if (page === "settings") {
      var setDiv = el("div");
      setDiv.appendChild(el("div", "mw-section-title", "\u2699 \u8BBE\u7F6E"));

      var iw3 = el("div", "mw-input-wrap");
      iw3.appendChild(el("div", "mw-input-label", "\uD83C\uDFAE \u73B0\u5728\u5728\u73A9\u4EC0\u4E48\uFF1F"));
      var inp3 = el("input", "mw-input"); inp3.value = gameName;
      inp3.oninput = function() { gameName = this.value; gameNameEdited = false; };
      inp3.onblur = function() { gameNameEdited = true; lsSet(LS_GAME_NAME, gameName); };
      iw3.appendChild(inp3); setDiv.appendChild(iw3);

      var iw4 = el("div", "mw-input-wrap");
      iw4.appendChild(el("div", "mw-input-label", "API Base"));
      var inp4 = el("input", "mw-input"); inp4.value = apiBase;
      inp4.oninput = function() { apiBase = this.value; lsSet("moodwave.switch.apiBase", apiBase); };
      iw4.appendChild(inp4); setDiv.appendChild(iw4);

      setDiv.appendChild(btn("mw-button", "\u6D4B\u8BD5\u8FDE\u63A5", busy, "", function() {
        run("\u6D4B\u8BD5\u8FDE\u63A5", function(cb) { apiRequest("/api/now", null, cb); });
      }));

      var sp = el("div", "mw-spacer");
      sp.appendChild(btn("mw-button" + (autoContinue?" is-active":""), (autoContinue?"\u2713 ":"") + "\u81EA\u52A8\u7EED\u64AD \u00B7 \u64AD\u5B8C\u81EA\u52A8\u6362\u4E0B\u4E00\u7EC4", false, "", function() { autoContinue = !autoContinue; lsSet(LS_AUTO, autoContinue ? "1" : "0"); render(); }));
      setDiv.appendChild(sp);
      rootDiv.appendChild(setDiv);
    }

    // ─── DJ Card ───
    if (page !== "settings" && (djLine || queue.length > 0)) {
      var djDiv = el("div");
      var djt = el("div", "mw-section-title");
      djt.innerHTML = "<span>\u2726</span>AI DJ";
      djDiv.appendChild(djt);

      var djc = el("div", "mw-card mw-card-accent");
      if (djLine) djc.appendChild(el("div", "mw-dj", djLine));

      for (var qi = 0; qi < queue.length; qi++) {
        var item = queue[qi];
        var isCur = track && (item.id===track.id || item.sourceId===track.sourceId);
        var song = el("div", "mw-song" + (isCur ? " mw-song-active" : ""));
        song.appendChild(el("div", "mw-song-title", item.title||"\u672A\u77E5\u6B4C\u66F2"));
        if (item.artist) song.appendChild(el("div", "mw-song-artist", item.artist));
        if (item.reason) song.appendChild(el("div", "mw-song-reason", item.reason));
        djc.appendChild(song);
      }
      djDiv.appendChild(djc);
      rootDiv.appendChild(djDiv);
    }

    updateProgressTimer();
    return rootDiv;
  }

  // ─── init ───
  startPoll();
})();
</script>
</body>
</html>
